<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: MANNY-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020408; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hero-frame { border: 2px solid #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .manny-gradient { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 via-black to-black">
    <div class="max-w-3xl w-full space-y-8">
        <div class="text-center mt-10">
            <h1 class="text-5xl font-black italic uppercase tracking-tighter manny-gradient">Manny-Fest Destiny</h1>
            <p id="late-clock" class="text-red-500 font-bold mt-2 animate-pulse tracking-widest text-sm">STATUS: CRITICALLY LATE</p>
        </div>

        <div class="glass hero-frame rounded-[2.5rem] overflow-hidden relative">
            <img src="IMG_3271.jpeg" class="w-full h-[450px] object-cover opacity-90" alt="Manny Batman">
            <div class="absolute inset-0 bg-gradient-to-t from-[#020408] to-transparent opacity-60"></div>
            <div class="absolute bottom-8 left-8">
                <p class="text-[10px] tracking-[0.3em] text-blue-400 font-bold uppercase mb-1">Current Shift Deficit</p>
                <h2 class="text-5xl font-black italic"><span id="mins-count">...</span> MINS</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl flex items-center gap-6 border-l-4 border-l-blue-500">
                <img src="IMG_2995.jpeg" class="w-20 h-20 rounded-2xl object-cover" alt="Phone Manny">
                <div>
                    <p class="text-xs text-gray-500 uppercase font-bold tracking-widest">Est. Arrival</p>
                    <p class="text-xl font-bold italic">"Next Year"</p>
                </div>
            </div>
            <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center border-t border-white/5">
                <p class="text-red-500 font-black text-2xl uppercase italic">Efficiency: 0%</p>
                <p class="text-[10px] text-gray-600 uppercase tracking-widest mt-1">Status: Disconnected</p>
            </div>
        </div>
        
        <p class="text-center text-[10px] text-gray-700 tracking-[0.5em] uppercase">Built in Wichita for the JCR Flooring Intervention</p>
    </div>

    <script>
        function update() {
            const now = new Date();
            const start = new Date();
            start.setHours(8, 0, 0);
            const diff = Math.floor((now - start) / 60000);
            document.getElementById('mins-count').innerText = diff > 0 ? diff : 0;
            document.getElementById('late-clock').innerText = "STATUS: MANNY IS " + diff + " MINUTES LATE";
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
